<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ClinicSys - Consultas')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar-atendimento}"></div>
<div th:replace="~{fragments/layout :: mensagem}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-calendar-check"></i> Consultas</h2>
        <a th:href="@{/atendimento/consultas/nova}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nova Consulta
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Data/Hora</th>
                            <th>Retorno</th>
                            <th>Paciente</th>
                            <th>Médico</th>
                            <th>Observação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="consulta : ${consultas}">
                            <td th:text="${consulta.codigo()}"></td>
                            <td th:text="${#temporals.format(consulta.data_hora().toLocalDateTime(), 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${consulta.data_hora_volta() != null} ? ${#temporals.format(consulta.data_hora_volta().toLocalDateTime(), 'dd/MM/yyyy HH:mm')} : '-'"></td>
                            <td th:text="${consulta.id_paciente() != null} ? ${consulta.id_paciente().nome()} : '-'"></td>
                            <td th:text="${consulta.id_medico() != null} ? ${consulta.id_medico().nome()} : '-'"></td>
                            <td th:text="${consulta.observacao()}"></td>
                        </tr>
                        <tr th:if="${consultas == null or consultas.empty}">
                            <td colspan="6" class="text-center text-muted py-4">
                                Nenhuma consulta cadastrada.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
