<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ClinicSys - Pacientes')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar-atendimento}"></div>
<div th:replace="~{fragments/layout :: mensagem}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people"></i> Pacientes</h2>
        <a th:href="@{/atendimento/pacientes/novo}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Novo Paciente
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>CPF</th>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Plano de Saúde</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="paciente : ${pacientes}">
                            <td th:text="${paciente.id()}"></td>
                            <td th:text="${paciente.cpf()}"></td>
                            <td th:text="${paciente.nome()}"></td>
                            <td th:text="${paciente.email()}"></td>
                            <td th:text="${paciente.numero()}"></td>
                            <td th:text="${paciente.plano_saude()}"></td>
                            <td class="text-center">
                                <a th:href="@{/atendimento/pacientes/editar/{id}(id=${paciente.id()})}"
                                   class="btn btn-sm btn-warning me-1" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/atendimento/pacientes/excluir/{id}(id=${paciente.id()})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Deseja realmente excluir este paciente?')"
                                   title="Excluir">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${pacientes == null or pacientes.empty}">
                            <td colspan="7" class="text-center text-muted py-4">
                                Nenhum paciente cadastrado.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
