<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">ClinicSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,.075);
            border: none;
        }
        .table th {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<!-- Navbar Atendimento -->
<nav th:fragment="navbar-atendimento" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-hospital"></i> ClinicSys
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAtendimento">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarAtendimento">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/atendimento/pacientes}">
                        <i class="bi bi-people"></i> Pacientes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/atendimento/medicos}">
                        <i class="bi bi-person-badge"></i> Médicos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/atendimento/medicamentos}">
                        <i class="bi bi-capsule"></i> Medicamentos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/atendimento/consultas}">
                        <i class="bi bi-calendar-check"></i> Consultas
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house"></i> Início
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Navbar Médico -->
<nav th:fragment="navbar-medico" class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/medico/dashboard}">
            <i class="bi bi-hospital"></i> ClinicSys - Área Médica
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMedico">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMedico">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/medico/dashboard}">
                        <i class="bi bi-clipboard-pulse"></i> Consultas Pendentes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/medico/realizadas}">
                        <i class="bi bi-clipboard-check"></i> Consultas Realizadas
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" th:if="${medico != null}">
                    <span class="nav-link disabled">
                        <i class="bi bi-person-circle"></i> Dr(a). <span th:text="${medico.nome()}"></span>
                    </span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/medico/logout}">
                        <i class="bi bi-box-arrow-right"></i> Sair
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Mensagens Flash -->
<div th:fragment="mensagem" class="container">
    <div th:if="${mensagem}" class="alert alert-dismissible fade show"
         th:classappend="'alert-' + ${tipoMensagem}" role="alert">
        <span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- Footer -->
<footer th:fragment="footer" class="text-center text-muted py-4 mt-5">
    <hr>
    <p>&copy; 2026 ClinicSys - Sistema de Gerenciamento de Clínica</p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
