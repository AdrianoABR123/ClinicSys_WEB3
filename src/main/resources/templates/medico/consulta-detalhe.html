<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ClinicSys - Detalhe de Consulta')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar-medico}"></div>

<div class="container">
    <div class="row">
        <!-- Detalhes do Paciente e Consulta -->
        <div class="col-md-4">
            <div class="card mb-4 bg-white shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title text-success border-bottom pb-2 mb-3">
                        <i class="bi bi-person-bounding-box"></i> Dados do Paciente
                    </h5>
                    <p class="mb-2"><strong>Nome:</strong> <span th:text="${consulta.id_paciente().nome()}"></span></p>
                    <p class="mb-2"><strong>CPF:</strong> <span th:text="${consulta.id_paciente().cpf()}"></span></p>
                    <p class="mb-2"><strong>Plano:</strong> <span th:text="${consulta.id_paciente().plano_saude() != null} ? ${consulta.id_paciente().plano_saude()} : 'Particular'"></span></p>
                    <p class="mb-2"><strong>E-mail:</strong> <span th:text="${consulta.id_paciente().email()}"></span></p>
                    <p class="mb-0"><strong>Telefone:</strong> <span th:text="${consulta.id_paciente().numero()}"></span></p>
                </div>
            </div>

            <div class="card mb-4 bg-white shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title text-success border-bottom pb-2 mb-3">
                        <i class="bi bi-calendar-event"></i> Dados da Consulta
                    </h5>
                    <p class="mb-2"><strong>Código:</strong> <span th:text="${consulta.codigo()}"></span></p>
                    <p class="mb-2"><strong>Data/Hora:</strong> <span th:text="${#temporals.format(consulta.data_hora().toLocalDateTime(), 'dd/MM/yyyy HH:mm')}"></span></p>
                    <p class="mb-2"><strong>Retorno:</strong> <span th:text="${consulta.data_hora_volta() != null} ? ${#temporals.format(consulta.data_hora_volta().toLocalDateTime(), 'dd/MM/yyyy HH:mm')} : 'Não'"></span></p>
                    <p class="mb-0"><strong>Observações:</strong> <span th:text="${consulta.observacao()}"></span></p>
                </div>
            </div>
        </div>

        <!-- Formulário de Atendimento (Prontuário + Receituário Opcional) -->
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h4 class="card-title mb-4"><i class="bi bi-heart-pulse"></i> Registro de Atendimento</h4>
                    
                    <form th:action="@{/medico/consulta/{id}/prontuario(id=${consulta.id()})}" method="post" id="formAtendimento">
                        
                        <!-- Prontuário -->
                        <h5 class="text-success mb-3 pb-1 border-bottom"><i class="bi bi-file-earmark-text"></i> Prontuário</h5>
                        <div class="mb-3">
                            <label for="descricao" class="form-label">Descrição Clínica / Anamnese *</label>
                            <textarea class="form-control" id="descricao" name="descricao" rows="4" required placeholder="Descreva os sintomas, diagnóstico e conduta clínica..."></textarea>
                        </div>
                        <div class="mb-4">
                            <label for="observacao" class="form-label">Observações</label>
                            <input type="text" class="form-control" id="observacao" name="observacao" placeholder="Alguma observação geral...">
                        </div>

                        <!-- Checkbox Receituário -->
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" role="switch" id="incluirReceituario" name="incluirReceituario" onchange="toggleReceituario()">
                            <label class="form-check-label fw-bold text-success" for="incluirReceituario">
                                <i class="bi bi-prescription"></i> Emitir Receituário para esta Consulta
                            </label>
                        </div>

                        <!-- Container do Receituário (Escondido inicialmente) -->
                        <div id="receituarioContainer" style="display: none;" class="p-3 bg-light rounded border mb-4">
                            <h5 class="text-success mb-3"><i class="bi bi-capsule-capsules"></i> Receituário Opcional</h5>
                            
                            <div class="mb-3">
                                <label for="obsReceituario" class="form-label">Observações da Receita</label>
                                <input type="text" class="form-control" id="obsReceituario" name="obsReceituario" placeholder="Ex: Tomar medicamentos com água, repouso, etc.">
                            </div>

                            <hr>
                            <h6>Medicamentos Prescritos</h6>
                            
                            <!-- Lista Dinâmica de Medicamentos -->
                            <div id="listaItens">
                                <!-- Primeiro item de exemplo -->
                                <div class="row item-medicamento g-2 align-items-end mb-3 border-bottom pb-3">
                                    <div class="col-md-5">
                                        <label class="form-label">Medicamento *</label>
                                        <select class="form-select select-medicamento" name="medicamentoIds">
                                            <option value="">Selecione o medicamento...</option>
                                            <option th:each="med : ${medicamentos}" 
                                                    th:value="${med.id()}"
                                                    th:text="${med.nome() + ' (' + med.dosagem() + ' ' + med.tipo_dosagem() + ')'}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Intervalo (Horas) *</label>
                                        <input type="number" class="form-control input-intervalo" name="intervaloDoses" min="1" placeholder="Ex: 8">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Instruções/Obs</label>
                                        <input type="text" class="form-control input-obs" name="obsItem" placeholder="Ex: Após refeições">
                                    </div>
                                    <div class="col-md-1 text-center">
                                        <button type="button" class="btn btn-outline-danger btn-remover" onclick="removerItem(this)" disabled>
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <button type="button" class="btn btn-outline-success btn-sm" onclick="adicionarItem()">
                                <i class="bi bi-plus-lg"></i> Adicionar Mais Medicamento
                            </button>
                        </div>

                        <!-- Ações -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle"></i> Salvar e Concluir Consulta
                            </button>
                            <a th:href="@{/medico/dashboard}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<!-- Script dinâmico para o Receituário -->
<script th:inline="javascript">
    const medicamentosList = [[${medicamentos}]];

    function toggleReceituario() {
        const checkbox = document.getElementById('incluirReceituario');
        const container = document.getElementById('receituarioContainer');
        const selects = document.querySelectorAll('.select-medicamento');
        const intervalos = document.querySelectorAll('.input-intervalo');

        if (checkbox.checked) {
            container.style.display = 'block';
            selects.forEach(s => s.setAttribute('required', 'required'));
            intervalos.forEach(i => i.setAttribute('required', 'required'));
        } else {
            container.style.display = 'none';
            selects.forEach(s => s.removeAttribute('required'));
            intervalos.forEach(i => i.removeAttribute('required'));
        }
    }

    function adicionarItem() {
        const lista = document.getElementById('listaItens');
        const novoItem = document.querySelector('.item-medicamento').cloneNode(true);
        
        // Limpar os campos copiados
        novoItem.querySelector('.select-medicamento').value = '';
        novoItem.querySelector('.input-intervalo').value = '';
        novoItem.querySelector('.input-obs').value = '';
        
        // Habilitar remoção no novo item
        const btnRemover = novoItem.querySelector('.btn-remover');
        btnRemover.removeAttribute('disabled');
        
        // Garantir validação se estiver ativo
        const checkbox = document.getElementById('incluirReceituario');
        if (checkbox.checked) {
            novoItem.querySelector('.select-medicamento').setAttribute('required', 'required');
            novoItem.querySelector('.input-intervalo').setAttribute('required', 'required');
        }

        lista.appendChild(novoItem);
        
        // Se houver mais de um, podemos habilitar todos os botões de remover
        atualizarBotoesRemover();
    }

    function removerItem(button) {
        const item = button.closest('.item-medicamento');
        const lista = document.getElementById('listaItens');
        if (lista.children.length > 1) {
            item.remove();
        }
        atualizarBotoesRemover();
    }

    function atualizarBotoesRemover() {
        const lista = document.getElementById('listaItens');
        const botoes = lista.querySelectorAll('.btn-remover');
        if (lista.children.length === 1) {
            botoes[0].setAttribute('disabled', 'disabled');
        } else {
            botoes.forEach(b => b.removeAttribute('disabled'));
        }
    }
</script>

</body>
</html>
